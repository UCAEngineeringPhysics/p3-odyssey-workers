ekf_filter_node:
  ros__parameters:
    # The frequency (in Hz) at which the filter will output a position estimate
    frequency: 30.0
    
    # Set to true if your robot operates in a flat, 2D environment
    two_d_mode: true
    
    # This tells the node to publish the odom -> base_link transform automatically!
    publish_tf: true

    # Coordinate frames
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # --- SENSOR 1: WHEEL ODOMETRY ---
    odom0: /odom_pub 
    # We trust the wheels for linear velocity (Vx) and a bit of rotational velocity (Vyaw)
    odom0_config: [false, false, false, 
                   false, false, false, 
                   true,  false, false, 
                   false, false, true,  
                   false, false, false] 
    #recomended but well see if it shits itself

    # --- SENSOR 2: IMU ---
    imu0: /imu_pub 
    # We trust the IMU heavily for rotational velocity (Vyaw) and linear acceleration (Ax)
    imu0_config: [false, false, false,
                  false, false, false, 
                  false, false, false,
                  false, false, true, 
                  true,  false, false]
    
    # If your IMU includes gravity in its linear acceleration data, set this to true
    imu0_remove_gravitational_acceleration: true

    ##RP Lidar Odometry (from rf2o)
    odom1: /laser_odom 
    odom1_config: [false, false, false,
                   false, false, false,
                   true,  true,  false, 
                   false, false, true,  
                   false, false, false]